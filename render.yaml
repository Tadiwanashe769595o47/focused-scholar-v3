services:
  - type: web
    name: focused-scholar-api
    env: node
    buildCommand: npm install
    startCommand: npm run build && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: TEACHER_ACCESS_CODE
        sync: false
      - key: HOLIDAY_ACCESS_CODE
        sync: false
      - key: PARENT_ACCESS_CODE
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false